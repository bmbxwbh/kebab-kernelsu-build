name: Build KernelSU for OnePlus 8T

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      lineage_version:
        description: 'LineageOS version branch'
        required: true
        default: 'lineage-23.2'
      kernelsu_version:
        description: 'KernelSU version/tag'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    strategy:
      matrix:
        include:
          - variant: balanced
            suffix: ""
            features: "balanced"
          - variant: sufs
            suffix: "-sufs"
            features: "sufs"
          - variant: battery
            suffix: "-battery"
            features: "battery"
          - variant: hide
            suffix: "-hide"
            features: "hide"
          - variant: performance
            suffix: "-performance"
            features: "performance"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git curl wget flex bison build-essential \
            libssl-dev libelf-dev python3 python3-pip \
            bc automake lzop gperf zip unzip \
            zlib1g-dev libxml2-utils bzip2 libbz2-dev \
            squashfs-tools liblz4-tool libncurses5-dev \
            cpio xz-utils device-tree-compiler \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Clang/LLVM toolchain
        run: |
          apt-get install -y clang llvm lld

      - name: Set up git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git config --global color.ui false

      - name: Clone kernel + device + vendor source
        env:
          LINEAGE_VERSION: ${{ inputs.lineage_version || 'lineage-23.2' }}
        run: |
          mkdir -p ~/android && cd ~/android
          git clone --depth 1 -b $LINEAGE_VERSION https://github.com/LineageOS/android_kernel_oneplus_sm8250.git kernel/oneplus/sm8250
          git clone --depth 1 -b $LINEAGE_VERSION https://github.com/LineageOS/android_device_oneplus_kebab.git device/oneplus/kebab
          git clone --depth 1 -b $LINEAGE_VERSION https://github.com/TheMuppets/proprietary_vendor_oneplus.git vendor/oneplus 2>/dev/null || true
          ls kernel/oneplus/sm8250/arch/arm64/configs/vendor/

      - name: Clone AnyKernel3
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git ~/AnyKernel3_${{ matrix.variant }}

      - name: Integrate KernelSU
        env:
          KERNELSU_VERSION: ${{ inputs.kernelsu_version || 'main' }}
        run: |
          cd ~/android/kernel/oneplus/sm8250
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s $KERNELSU_VERSION

      - name: Configure kernel - Base options
        run: |
          cd ~/android/kernel/oneplus/sm8250

          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          make vendor/kona-perf_defconfig

          ./scripts/config --enable CONFIG_KSU
          ./scripts/config --enable CONFIG_KPROBES
          ./scripts/config --enable CONFIG_HAVE_KPROBES
          ./scripts/config --enable CONFIG_KPROBE_EVENTS

          ./scripts/config --disable CONFIG_SND_SOC_MSM8996_WCD9335 || true
          ./scripts/config --disable CONFIG_MSM_CAMERA || true
          ./scripts/config --disable CONFIG_VIDEO_MSM_CAMERA || true

      - name: Configure kernel - Balanced features (default)
        if: matrix.features == 'balanced'
        run: |
          cd ~/android/kernel/oneplus/sm8250

          export ARCH=arm64
          export SUBARCH=arm64

          echo "Enabling balanced features..."
          
          ./scripts/config --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --enable CONFIG_NTFS3_FS
          ./scripts/config --enable CONFIG_EXFAT_FS
          ./scripts/config --enable CONFIG_ZSWAP
          ./scripts/config --enable CONFIG_UCLAMP_TASK
          
          ./scripts/config --enable CONFIG_ZRAM
          ./scripts/config --enable CONFIG_ZRAM_COMPRESSION_LZ4
          ./scripts/config --set-val CONFIG_ZRAM_MEMORY_PERCENTAGE 50
          ./scripts/config --set-val CONFIG_ZRAM_MAX_DEVICES 1

          make olddefconfig

      - name: Configure kernel - Battery saving features
        if: matrix.features == 'battery'
        run: |
          cd ~/android/kernel/oneplus/sm8250

          export ARCH=arm64
          export SUBARCH=arm64

          echo "Enabling battery saving features..."
          
          ./scripts/config --enable CONFIG_UCLAMP_TASK
          ./scripts/config --enable CONFIG_UCLAMP_SCHED
          ./scripts/config --enable CONFIG_ZSWAP
          ./scripts/config --enable CONFIG_ZSWAP_DEFAULT_ON
          ./scripts/config --disable CONFIG_DEBUG_FS

          make olddefconfig

      - name: Configure kernel - Hide features
        if: matrix.features == 'hide' || matrix.features == 'sufs'
        run: |
          cd ~/android/kernel/oneplus/sm8250

          export ARCH=arm64
          export SUBARCH=arm64

          echo "Enabling hide features..."
          
          ./scripts/config --enable CONFIG_KSU_HIDE_PID
          ./scripts/config --enable CONFIG_KSU_UNSHARE
          ./scripts/config --disable CONFIG_KALLSYMS_ALL
          ./scripts/config --disable CONFIG_DEBUG_FS
          ./scripts/config --disable CONFIG_PROC_KCORE

          if [ "${{ matrix.features }}" = "sufs" ]; then
            ./scripts/config --enable CONFIG_KSU_SAFE_SECURITY_FILESYSTEM
          fi

          make olddefconfig

      - name: Configure kernel - Performance features
        if: matrix.features == 'performance'
        run: |
          cd ~/android/kernel/oneplus/sm8250

          export ARCH=arm64
          export SUBARCH=arm64

          echo "Enabling performance features..."
          
          ./scripts/config --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --enable CONFIG_NTFS3_FS
          ./scripts/config --enable CONFIG_EXFAT_FS
          ./scripts/config --enable CONFIG_FTRACE
          ./scripts/config --enable CONFIG_FUNCTION_TRACER
          ./scripts/config --enable CONFIG_UCLAMP_TASK
          ./scripts/config --enable CONFIG_SCHED_WALT
          
          ./scripts/config --enable CONFIG_ZRAM
          ./scripts/config --enable CONFIG_ZRAM_COMPRESSION_LZ4
          ./scripts/config --set-val CONFIG_ZRAM_MEMORY_PERCENTAGE 100
          ./scripts/config --set-val CONFIG_ZRAM_MAX_DEVICES 1

          make olddefconfig

      - name: Build kernel
        run: |
          cd ~/android/kernel/oneplus/sm8250

          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          export KCFLAGS="-Wno-error"

          make -j$(nproc) Image.gz dtbs 2>&1 | tail -n 500

      - name: Prepare AnyKernel3
        run: |
          cd ~/android/kernel/oneplus/sm8250

          ANYKERNEL_DIR=~/AnyKernel3_${{ matrix.variant }}

          if [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz "$ANYKERNEL_DIR/"
          elif [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image "$ANYKERNEL_DIR/Image.gz"
          fi

          if [ -d arch/arm64/boot/dts ]; then
            cp -r arch/arm64/boot/dts "$ANYKERNEL_DIR/"
          fi

          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "KernelSU-${{ inputs.kernelsu_version || 'main' }}-$TAG_NAME${{ matrix.suffix }}" > "$ANYKERNEL_DIR/version"

      - name: Package AnyKernel3
        run: |
          ANYKERNEL_DIR=~/AnyKernel3_${{ matrix.variant }}
          cd "$ANYKERNEL_DIR"
          HOME_DIR="$HOME"
          zip -r9 "$HOME_DIR/KernelSU-kebab-${{ matrix.variant }}-$(date +%Y%m%d).zip" * -x .git README.md AnyKernel3.zip
          ls -la "$HOME_DIR/KernelSU-kebab-${{ matrix.variant }}-"*.zip

      - name: Upload AnyKernel3 zip
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-kebab-zip-${{ matrix.variant }}
          path: ~/KernelSU-kebab-${{ matrix.variant }}-*.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/

      - name: List files
        run: ls -la ./dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./dist/**/*.zip
          body: |
            ## OnePlus 8T (kebab) KernelSU

            ### Build Info
            - Device: OnePlus 8T (kebab)
            - SoC: Qualcomm SM8250 (Snapdragon 865)
            - KernelSU: ${{ inputs.kernelsu_version || 'main' }}
            - Kernel branch: ${{ inputs.lineage_version || 'lineage-23.2' }}

            ### Downloads

            | Variant | Description | Features |
            |---------|-------------|----------|
            | `KernelSU-kebab-balanced-*.zip` | **Recommended** | BBRv3, NTFS3, exFAT, ZSwap, UClamp, ZRAM 50% |
            | `KernelSU-kebab-sufs-*.zip` | SUFS version | Safe Security FileSystem + Full Hide features |
            | `KernelSU-kebab-battery-*.zip` | Battery saving | UClamp, ZSwap (default), disabled DEBUG_FS |
            | `KernelSU-kebab-hide-*.zip` | Hide enhanced | HidePID, Unshare, disable debug symbols |
            | `KernelSU-kebab-performance-*.zip` | Performance | BBRv3, NTFS3, exFAT, FTrace, WALT, ZRAM 1:1 |

            ### Feature Details

            **⚖️ Balanced (推荐):**
            - TCP BBRv3 congestion control
            - NTFS3 & exFAT support
            - ZSwap compression
            - UClamp task scheduling
            - **ZRAM: 50% of physical memory**

            **🔋 Battery Saving:**
            - UClamp task scheduling
            - ZSwap compression (enabled by default)
            - Disable DEBUG_FS

            **🎭 Hide Features:**
            - KSU HidePID2
            - KSU Unshare
            - Disable KALLSYMS_ALL
            - Disable DEBUG_FS
            - Disable PROC_KCORE

            **🛡️ SUFS:**
            - All Hide features + Safe Security FileSystem

            **⚡ Performance:**
            - TCP BBRv3 congestion control
            - NTFS3 & exFAT support
            - FTrace debugging
            - WALT scheduling
            - UClamp
            - **ZRAM: 100% of physical memory (1:1)**

            ### Installation
            1. Flash via TWRP: Flash the zip in recovery
            2. Or flash via fastboot:
               ```
               fastboot flash boot boot.img
               ```
            3. Install KernelSU Manager from GitHub Releases

            ### Notes
            - Built from android_kernel_oneplus_sm8250 (${{ inputs.lineage_version || 'lineage-23.2' }})
            - Use at your own risk!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}