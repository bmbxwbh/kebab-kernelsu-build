name: Build KernelSU for OnePlus 8T

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      lineage_version:
        description: 'LineageOS version branch'
        required: true
        default: 'lineage-23.2'
      kernelsu_version:
        description: 'KernelSU version/tag'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    strategy:
      matrix:
        include:
          - variant: normal
            suffix: ""
          - variant: sufs
            suffix: "-sufs"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git curl wget flex bison build-essential \
            libssl-dev libelf-dev python3 python3-pip \
            bc automake lzop gperf zip unzip \
            zlib1g-dev libxml2-utils bzip2 libbz2-dev \
            squashfs-tools liblz4-tool libncurses5-dev \
            cpio xz-utils device-tree-compiler \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install Clang/LLVM toolchain
        run: |
          apt-get install -y clang llvm lld

      - name: Set up git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git config --global color.ui false

      - name: Clone kernel + device + vendor source
        env:
          LINEAGE_VERSION: ${{ inputs.lineage_version || 'lineage-23.2' }}
        run: |
          mkdir -p ~/android && cd ~/android
          git clone --depth 1 -b $LINEAGE_VERSION https://github.com/LineageOS/android_kernel_oneplus_sm8250.git kernel/oneplus/sm8250
          git clone --depth 1 -b $LINEAGE_VERSION https://github.com/LineageOS/android_device_oneplus_kebab.git device/oneplus/kebab
          git clone --depth 1 -b $LINEAGE_VERSION https://github.com/TheMuppets/proprietary_vendor_oneplus.git vendor/oneplus 2>/dev/null || true
          ls kernel/oneplus/sm8250/arch/arm64/configs/vendor/

      - name: Clone AnyKernel3
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git ~/AnyKernel3_${{ matrix.variant }}

      - name: Integrate KernelSU
        env:
          KERNELSU_VERSION: ${{ inputs.kernelsu_version || 'main' }}
        run: |
          cd ~/android/kernel/oneplus/sm8250
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s $KERNELSU_VERSION

      - name: Configure kernel
        run: |
          cd ~/android/kernel/oneplus/sm8250

          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          DEFCONFIG="vendor/kona-perf_defconfig"
          echo "Using defconfig: $DEFCONFIG"

          if [ ! -f "arch/arm64/configs/$DEFCONFIG" ]; then
            echo "ERROR: Defconfig not found"
            ls -la arch/arm64/configs/vendor/
            exit 1
          fi

          make "$DEFCONFIG"

          ./scripts/config --enable CONFIG_KSU
          ./scripts/config --enable CONFIG_KPROBES
          ./scripts/config --enable CONFIG_HAVE_KPROBES
          ./scripts/config --enable CONFIG_KPROBE_EVENTS

          ./scripts/config --disable CONFIG_SND_SOC_MSM8996_WCD9335 || true
          ./scripts/config --disable CONFIG_MSM_CAMERA || true
          ./scripts/config --disable CONFIG_VIDEO_MSM_CAMERA || true

          if [ "${{ matrix.variant }}" = "sufs" ]; then
            echo "Enabling SUFS..."
            ./scripts/config --enable CONFIG_KSU_SAFE_SECURITY_FILESYSTEM
          fi

          make olddefconfig

      - name: Build kernel
        run: |
          cd ~/android/kernel/oneplus/sm8250

          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          export KCFLAGS="-Wno-error"

          make -j$(nproc) Image.gz dtbs 2>&1 | tail -n 500

      - name: Prepare AnyKernel3
        run: |
          cd ~/android/kernel/oneplus/sm8250

          ANYKERNEL_DIR=~/AnyKernel3_${{ matrix.variant }}

          if [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz "$ANYKERNEL_DIR/"
          elif [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image "$ANYKERNEL_DIR/Image.gz"
          fi

          if [ -d arch/arm64/boot/dts ]; then
            cp -r arch/arm64/boot/dts "$ANYKERNEL_DIR/"
          fi

          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "KernelSU-${{ inputs.kernelsu_version || 'main' }}-$TAG_NAME${{ matrix.suffix }}" > "$ANYKERNEL_DIR/version"

      - name: Package AnyKernel3
        run: |
          ANYKERNEL_DIR=~/AnyKernel3_${{ matrix.variant }}
          cd "$ANYKERNEL_DIR"
          HOME_DIR="$HOME"
          zip -r9 "$HOME_DIR/KernelSU-kebab-${{ matrix.variant }}-$(date +%Y%m%d).zip" * -x .git README.md AnyKernel3.zip
          ls -la "$HOME_DIR/KernelSU-kebab-${{ matrix.variant }}-"*.zip

      - name: Upload boot image artifact
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-kebab-boot-${{ matrix.variant }}
          path: ~/AnyKernel3_${{ matrix.variant }}/Image.gz
          retention-days: 7

      - name: Upload AnyKernel3 zip
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-kebab-zip-${{ matrix.variant }}
          path: ~/KernelSU-kebab-${{ matrix.variant }}-*.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download normal variant artifact
        uses: actions/download-artifact@v4
        with:
          name: KernelSU-kebab-zip-normal
          path: ./dist/

      - name: Download sufs variant artifact
        uses: actions/download-artifact@v4
        with:
          name: KernelSU-kebab-zip-sufs
          path: ./dist/

      - name: List files
        run: ls -la ./dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./dist/*.zip
          body: |
            ## OnePlus 8T (kebab) KernelSU

            ### Build Info
            - Device: OnePlus 8T (kebab)
            - SoC: Qualcomm SM8250 (Snapdragon 865)
            - KernelSU: ${{ inputs.kernelsu_version || 'main' }}
            - Kernel branch: ${{ inputs.lineage_version || 'lineage-23.2' }}

            ### Downloads
            | Variant | Description |
            |---------|-------------|
            | `KernelSU-kebab-normal-*.zip` | Standard KernelSU build |
            | `KernelSU-kebab-sufs-*.zip` | With SUFS (Safe Security FileSystem) support |

            ### Installation
            1. Flash via TWRP: Flash the zip in recovery
            2. Or flash via fastboot:
               ```
               fastboot flash boot boot.img
               ```
            3. Install KernelSU Manager from GitHub Releases

            ### Notes
            - Built from android_kernel_oneplus_sm8250 (${{ inputs.lineage_version || 'lineage-23.2' }})
            - Use at your own risk!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}