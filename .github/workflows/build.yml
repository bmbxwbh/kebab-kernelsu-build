name: Build KernelSU for OnePlus 8T

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      lineage_version:
        description: 'LineageOS version branch'
        required: true
        default: 'lineage-23.2'
      kernelsu_version:
        description: 'KernelSU version/tag'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
            git curl wget flex bison build-essential \
            libssl-dev libelf-dev python3 python3-pip \
            bc schedtool ccache automake lzop gperf \
            zip unzip zlib1g-dev g++-multilib \
            libxml2-utils bzip2 libbz2-dev libbz2-1.0 \
            squashfs-tools pngcrush dpkg-dev liblz4-tool \
            lib32ncurses5-dev libx11-dev lib32z-dev \
            libncurses5 libncurses5-dev cpio xz-utils \
            repo libc6-dev-i386 lib32readline-dev \
            device-tree-compiler

      - name: Install Clang/LLVM toolchain
        run: |
          apt-get install -y clang llvm lld

      - name: Set up git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git config --global color.ui false

      - name: Sync kernel + device + vendor source (minimal)
        env:
          LINEAGE_VERSION: ${{ inputs.lineage_version || 'lineage-23.2' }}
        run: |
          mkdir -p ~/android && cd ~/android
          repo init -u https://github.com/LineageOS/android.git -b $LINEAGE_VERSION --depth=1 --git-lfs --no-clone-bundle
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags kernel/oneplus/sm8250 device/oneplus/kebab vendor/oneplus

      - name: Clone AnyKernel3
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git ~/AnyKernel3

      - name: Integrate KernelSU
        env:
          KERNELSU_VERSION: ${{ inputs.kernelsu_version || 'main' }}
        run: |
          cd ~/android/kernel/oneplus/sm8250
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s $KERNELSU_VERSION

      - name: Configure kernel
        run: |
          cd ~/android/kernel/oneplus/sm8250

          DEFCONFIG="arch/arm64/configs/vendor/kona-perf_defconfig"
          echo "Using defconfig: $DEFCONFIG"

          if [ ! -f "$DEFCONFIG" ]; then
            echo "ERROR: Defconfig not found at $DEFCONFIG"
            ls -la arch/arm64/configs/vendor/
            exit 1
          fi

          # Enable KernelSU and disable features that cause build errors
          echo -e "\n# KernelSU\nCONFIG_KSU=y\nCONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y\n# Disable problematic features\nCONFIG_TRACING=n\nCONFIG_FTRACE=n" >> "$DEFCONFIG"

      - name: Build kernel
        run: |
          cd ~/android/kernel/oneplus/sm8250

          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export PATH=/usr/lib/llvm-14/bin:/usr/bin:$PATH

          # Disable WERROR
          export KCFLAGS="-Wno-error"

          make clean && make mrproper
          make vendor/kona-perf_defconfig
          make -j$(nproc)

      - name: Prepare AnyKernel3
        run: |
          cd ~/android/kernel/oneplus/sm8250

          if [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz ~/AnyKernel3/
          elif [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image ~/AnyKernel3/Image.gz
          fi

          if [ -d arch/arm64/boot/dts ]; then
            cp -r arch/arm64/boot/dts ~/AnyKernel3/
          fi

          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "KernelSU-${{ inputs.kernelsu_version || 'main' }}-$TAG_NAME" > ~/AnyKernel3/version

      - name: Package AnyKernel3
        run: |
          cd ~/AnyKernel3
          zip -r9 ../KernelSU-kebab-$(date +%Y%m%d).zip * -x .git README.md AnyKernel3.zip

      - name: Upload boot image artifact
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-kebab-boot
          path: ~/AnyKernel3/Image.gz
          retention-days: 7

      - name: Upload AnyKernel3 zip
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-kebab-zip
          path: ~/KernelSU-kebab-*.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ~/KernelSU-kebab-*.zip
          body: |
            ## OnePlus 8T (kebab) KernelSU

            ### Build Info
            - Device: OnePlus 8T (kebab)
            - SoC: Qualcomm SM8250 (Snapdragon 865)
            - KernelSU: ${{ inputs.kernelsu_version || 'main' }}
            - Kernel branch: ${{ inputs.lineage_version || 'lineage-23.2' }}

            ### Installation
            1. Flash via TWRP: Flash the zip in recovery
            2. Or flash via fastboot:
               ```
               fastboot flash boot boot.img
               ```
            3. Install KernelSU Manager from GitHub Releases

            ### Notes
            - Built from android_kernel_oneplus_sm8250 (${{ inputs.lineage_version || 'lineage-23.2' }})
            - Use at your own risk!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
