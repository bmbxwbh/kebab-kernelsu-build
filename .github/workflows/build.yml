name: Build KernelSU for OnePlus 8T

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      lineage_version:
        description: 'LineageOS version'
        required: true
        default: 'lineage-23.2'
      kernelsu_version:
        description: 'KernelSU version/tag'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
            git curl wget flex bison build-essential \
            libssl-dev libelf-dev python3 python3-pip \
            bc schedtool ccache automake lzop gperf \
            zip unzip zlib1g-dev g++-multilib \
            libxml2-utils bzip2 libbz2-dev libbz2-1.0 \
            squashfs-tools pngcrush dpkg-dev liblz4-tool \
            lib32ncurses5-dev libx11-dev lib32z-dev \
            libncurses5 libncurses5-dev

      - name: Install repo command
        run: |
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod +x /usr/local/bin/repo
          pip3 install pyyaml

      - name: Set up git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git config --global color.ui false

      - name: Sync LineageOS source
        env:
          LINEAGE_VERSION: ${{ inputs.lineage_version || 'lineage-23.2' }}
        run: |
          mkdir -p ~/android/lineage
          cd ~/android/lineage
          repo init -u https://github.com/LineageOS/android.git -b $LINEAGE_VERSION --git-lfs --no-clone-bundle
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Prepare device
        run: |
          cd ~/android/lineage
          source build/envsetup.sh
          breakfast kebab

      - name: Clone AnyKernel3
        run: |
          git clone --depth 1 https://github.com/osm0sis/AnyKernel3.git ~/AnyKernel3

      - name: Integrate KernelSU
        env:
          KERNELSU_VERSION: ${{ inputs.kernelsu_version || 'main' }}
        run: |
          cd ~/android/lineage/kernel/oneplus/sm8250
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s $KERNELSU_VERSION

      - name: Configure kernel
        run: |
          cd ~/android/lineage/kernel/oneplus/sm8250

          DEFCONFIG=$(find arch/arm64/configs -name "*kebab*" -o -name "*sm8250*" | head -1)
          echo "Using defconfig: $DEFCONFIG"

          echo -e "\n# KernelSU\nCONFIG_KSU=y\nCONFIG_KPROBES=y\nCONFIG_HAVE_KPROBES=y\nCONFIG_KPROBE_EVENTS=y" >> "$DEFCONFIG"

      - name: Build kernel
        env:
          KERNELSU_VERSION: ${{ inputs.kernelsu_version || 'main' }}
        run: |
          cd ~/android/lineage/kernel/oneplus/sm8250

          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export PATH=~/android/lineage/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin:$PATH

          DEFCONFIG_NAME=$(basename $(find arch/arm64/configs -name "*kebab*" -o -name "*sm8250*" | head -1))
          make clean && make mrproper
          make "$DEFCONFIG_NAME"
          make -j$(nproc)

      - name: Prepare AnyKernel3
        env:
          KERNELSU_VERSION: ${{ inputs.kernelsu_version || 'main' }}
        run: |
          cd ~/android/lineage/kernel/oneplus/sm8250

          if [ -f arch/arm64/boot/Image.gz ]; then
            cp arch/arm64/boot/Image.gz ~/AnyKernel3/
          elif [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image ~/AnyKernel3/Image.gz
            gzip ~/AnyKernel3/Image.gz
          fi

          if [ -d arch/arm64/boot/dts ]; then
            cp -r arch/arm64/boot/dts ~/AnyKernel3/
          fi

          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "KernelSU-$KERNELSU_VERSION-$TAG_NAME" > ~/AnyKernel3/version

      - name: Package AnyKernel3
        env:
          KERNELSU_VERSION: ${{ inputs.kernelsu_version || 'main' }}
        run: |
          cd ~/AnyKernel3
          zip -r9 ../KernelSU-kebab-$(date +%Y%m%d).zip * -x .git README.md AnyKernel3.zip

      - name: Upload boot image artifact
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-kebab-boot
          path: ~/AnyKernel3/Image.gz
          retention-days: 7

      - name: Upload AnyKernel3 zip
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-kebab-zip
          path: ~/KernelSU-kebab-*.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ~/KernelSU-kebab-*.zip
          body: |
            ## OnePlus 8T (kebab) KernelSU

            ### Build Info
            - Device: OnePlus 8T (kebab)
            - SoC: Qualcomm SM8250 (Snapdragon 865)
            - KernelSU: ${{ inputs.kernelsu_version || 'main' }}
            - LineageOS: ${{ inputs.lineage_version || 'lineage-23.2' }}

            ### Installation
            1. Flash via TWRP: Flash the zip in recovery
            2. Or flash via fastboot:
               ```
               fastboot flash boot boot.img
               ```
            3. Install KernelSU Manager from GitHub Releases

            ### Notes
            - Built from LineageOS ${{ inputs.lineage_version || 'lineage-23.2' }}
            - Use at your own risk!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
